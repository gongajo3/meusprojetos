<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relógio Digital | José Gonga</title>
    <!-- Bootstrap Icons (mesmo estilo do portfólio) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Fonte Inter (moderna) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0c1b33 0%, #1e3a6b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* efeito de fundo sutil (igual ao hero do portfólio) */
        body::after {
            content: " ";
            position: absolute;
            top: -20%;
            right: -5%;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            pointer-events: none;
        }

        body::before {
            content: " ";
            position: absolute;
            bottom: -10%;
            left: -5%;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 50%;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 800px;
            width: 100%;
        }

        /* cabeçalho com ícone e título */
        .clock-header {
            text-align: center;
            margin-bottom: 2rem;
            color: white;
        }

        .clock-header i {
            font-size: 3rem;
            background: rgba(255,255,255,0.1);
            padding: 1rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 1rem;
        }

        .clock-header h2 {
            font-weight: 600;
            font-size: 2rem;
            letter-spacing: 2px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .clock-header p {
            opacity: 0.8;
            font-size: 1.1rem;
        }

        /* relógio principal - design inspirado nos cards do portfólio */
        .relogio-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 70px;
            padding: 3rem 2rem;
            box-shadow: 0 40px 60px -15px #00000080, 0 0 0 1px rgba(255,255,255,0.1) inset;
            transition: all 0.3s;
        }

        .relogio-card:hover {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 50px 70px -15px #0a1a33;
        }

        .clock-display {
            display: flex;
            align-items: center;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 1.5rem 2rem;
        }

        .time-unit {
            background: rgba(10, 20, 40, 0.5);
            border-radius: 50px;
            padding: 1.5rem 2rem;
            min-width: 170px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 15px 25px -10px #000000;
            transition: transform 0.2s;
        }

        .time-unit:hover {
            transform: scale(1.02);
            background: rgba(15, 30, 55, 0.7);
        }

        .time-number {
            font-size: 5rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 20px #7ab9ff;
            line-height: 1;
            font-feature-settings: "tnum";
            letter-spacing: 5px;
        }

        .time-label {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #b4d0ff;
            margin-top: 0.5rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .time-label i {
            font-size: 1rem;
            color: #7ab9ff;
        }

        /* separador visual (alternativa elegante) */
        .separator {
            font-size: 4rem;
            color: rgba(255,255,255,0.3);
            font-weight: 200;
            display: none; /* escondido em mobile, visível em desktop com flex */
        }

        @media (min-width: 700px) {
            .separator {
                display: block;
            }
        }

        /* data e saudação */
        .extra-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2.5rem;
            color: #e0ecff;
            flex-wrap: wrap;
            gap: 1rem;
            background: rgba(0,0,0,0.2);
            border-radius: 100px;
            padding: 1rem 2rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .date-box {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.3rem;
        }

        .date-box i {
            font-size: 1.8rem;
            color: #ffd966;
        }

        .greeting-box {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1.3rem;
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
        }

        .greeting-box i {
            font-size: 1.8rem;
        }

        /* botão voltar (link para portfólio) */
        .back-link {
            margin-top: 2.5rem;
            text-align: center;
        }

        .back-link a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(255,255,255,0.1);
            padding: 0.9rem 2.2rem;
            border-radius: 60px;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(4px);
            font-size: 1.1rem;
        }

        .back-link a:hover {
            background: rgba(255,255,255,0.25);
            border-color: white;
            gap: 1rem;
        }

        /* responsividade fina */
        @media (max-width: 600px) {
            .relogio-card { padding: 2rem 1rem; border-radius: 40px; }
            .time-unit { min-width: 130px; padding: 1rem; }
            .time-number { font-size: 3.5rem; }
            .extra-info { flex-direction: column; text-align: center; border-radius: 40px; }
        }

        h6{
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- cabeçalho alinhado ao estilo do portfólio -->
        <div class="clock-header">
            <i class="bi bi-clock-fill"></i>
            <h2>RELÓGIO DIGITAL</h2>
            <p>tempo real · design integrado</p>
        </div>

        <!-- card principal do relógio -->
        <div class="relogio-card">
            <div class="clock-display">
                <!-- horas -->
                <div class="time-unit">
                    <div class="time-number" id="horas">00</div>
                    <div class="time-label"><i class="bi bi-sun-fill"></i> HORAS</div>
                </div>
                <!-- separador visual (somente desktop) -->
                <span class="separator">:</span>
                <!-- minutos -->
                <div class="time-unit">
                    <div class="time-number" id="minutos">00</div>
                    <div class="time-label"><i class="bi bi-droplet-fill"></i> MINUTOS</div>
                </div>
                <!-- separador -->
                <span class="separator">:</span>
                <!-- segundos -->
                <div class="time-unit">
                    <div class="time-number" id="segundos">00</div>
                    <div class="time-label"><i class="bi bi-fire"></i> SEGUNDOS</div>
                </div>
            </div>

            <!-- área extra: data e saudação -->
            <div class="extra-info">
                <div class="date-box">
                    <i class="bi bi-calendar3"></i>
                    <span id="data-atual"></span>
                </div>
                <div class="greeting-box" id="saudacao">
                    <i class="bi bi-emoji-smile-fill"></i>
                    <span>Bem-vindo</span>
                </div>
            </div>
        </div>

        <!-- link simbólico de volta (pode ligar ao portfólio) -->
        <div class="back-link">
            <a href="./index.html"><i class="bi bi-arrow-left-short"></i> voltar ao portfólio</a>
        </div>

       
    </div>

    <script>
        // elementos DOM
        const horasSpan = document.getElementById('horas');
        const minutosSpan = document.getElementById('minutos');
        const segundosSpan = document.getElementById('segundos');
        const dataSpan = document.getElementById('data-atual');
        const saudacaoSpan = document.getElementById('saudacao').querySelector('span');

        // função para formatar com 2 dígitos
        function formatarDoisDigitos(num) {
            return num.toString().padStart(2, '0');
        }

        // atualizar relógio + data + saudação
        function atualizarRelogio() {
            const agora = new Date();

            // Horas, minutos, segundos
            const hr = agora.getHours();
            const min = agora.getMinutes();
            const seg = agora.getSeconds();

            horasSpan.textContent = formatarDoisDigitos(hr);
            minutosSpan.textContent = formatarDoisDigitos(min);
            segundosSpan.textContent = formatarDoisDigitos(seg);

            // Data completa (formato português)
            const opcoesData = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            };
            const dataFormatada = agora.toLocaleDateString('pt-PT', opcoesData);
            // Capitalizar primeira letra (ex: "segunda-feira" → "Segunda-feira")
            dataSpan.textContent = dataFormatada.charAt(0).toUpperCase() + dataFormatada.slice(1);

            // Saudação baseada na hora
            let saudacao = '';
            let icone = '';

            if (hr >= 5 && hr < 12) {
                saudacao = 'Bom dia';
                icone = '🌅';
            } else if (hr >= 12 && hr < 18) {
                saudacao = 'Boa tarde';
                icone = '☀️';
            } else {
                saudacao = 'Boa noite';
                icone = '🌙';
            }

            // Atualizar texto da saudação
            saudacaoSpan.innerHTML = `${saudacao} ${icone}`;
        }

        // executar imediatamente e depois a cada segundo
        atualizarRelogio();
        setInterval(atualizarRelogio, 1000);

        // Extra: efeito de "hover" mantido pelo CSS, mas podemos adicionar 
        // uma pequena animação de brilho nos números (opcional)
        // (já implementado via text-shadow)
    </script>
</body>
</html>
