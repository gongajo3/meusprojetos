<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora | José Gonga</title>
  <!-- Bootstrap Icons (mesmo estilo do portfólio) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Fonte Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #eef2f7 0%, #d9e2ef 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      padding: 1rem;
    }

    /* card principal da calculadora — mesmo estilo dos cards do portfólio */
    .calculator-card {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 48px;
      padding: 2rem 1.8rem;
      box-shadow: 0 30px 50px -20px #1e293b80;
      max-width: 400px;
      width: 100%;
      transition: all 0.3s;
    }

    .calculator-card:hover {
      background: white;
      box-shadow: 0 40px 60px -15px #1e3a6baa;
    }

    /* ecrã / display */
    .display {
      background: #0e1f38;
      border-radius: 32px;
      padding: 1.5rem 1.2rem;
      margin-bottom: 1.8rem;
      box-shadow: inset 0 -3px 0 #1e3a6b, 0 8px 18px #00000030;
    }

    #resultado {
      width: 100%;
      background: transparent;
      border: none;
      color: white;
      font-size: 2.8rem;
      font-weight: 600;
      text-align: right;
      outline: none;
      font-family: 'Inter', monospace;
      letter-spacing: 1px;
    }

    #resultado::placeholder {
      color: #6b8bb0;
      font-weight: 400;
      opacity: 0.6;
    }

    /* grelha de botões */
    .buttons-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.9rem;
    }

    /* estilo base dos botões — igual aos .btn do portfólio */
    .btn-calc {
      background: #f4f9ff;
      border: 1px solid #d6e4ff;
      border-radius: 30px;
      padding: 1.3rem 0.5rem;
      font-size: 1.6rem;
      font-weight: 600;
      color: #0c1b33;
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 4px 8px #00000010;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', monospace;
      border-bottom: 3px solid #b5c9f0;
    }

    .btn-calc i {
      font-size: 1.7rem;
      color: #2563eb;
    }

    .btn-calc:hover {
      background: #ffffff;
      transform: scale(0.97);
      border-color: #2563eb;
      box-shadow: 0 10px 18px -6px #2563eb80;
    }

    /* botões de operador (laranja/azul) */
    .operator {
      background: #e0e9ff;
      color: #1e3a6b;
      border-bottom-color: #2563eb;
      font-weight: 700;
    }

    .operator i {
      color: #1e3a6b;
    }

    .equals {
      background: #2563eb;
      color: white;
      border-bottom-color: #0f2b50;
      grid-column: span 2;
    }

    .equals i {
      color: white;
    }

    .equals:hover {
      background: #1a47b3;
    }

    .clear {
      background: #ffdfe0;
      color: #b91c1c;
      border-bottom-color: #f5a3a3;
    }

    .clear i {
      color: #b91c1c;
    }

    /* botão de voltar (link para o portfólio) */
    .back-link {
      margin-top: 2rem;
      text-align: center;
    }

    .back-link a {
      color: #1e3a6b;
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: rgba(255,255,255,0.6);
      padding: 0.7rem 1.8rem;
      border-radius: 40px;
      transition: 0.2s;
      border: 1px solid white;
    }

    .back-link a:hover {
      background: white;
      border-color: #2563eb;
    }

    /* responsividade */
    @media (max-width: 450px) {
      .calculator-card { padding: 1.5rem; }
      .btn-calc { padding: 1rem 0.2rem; font-size: 1.4rem; }
      #resultado { font-size: 2.2rem; }
    }
  </style>
</head>
<body>
  <div class="calculator-card">
    <!-- display -->
    <div class="display">
      <input type="text" id="resultado" readonly placeholder="0" value="0">
    </div>

    <!-- grelha de botões com ícones Bootstrap e funções aprimoradas -->
    <div class="buttons-grid">
      <!-- limpar tudo (CE) -->
      <button class="btn-calc clear" onclick="limparTudo()"><i class="bi bi-backspace-fill"></i></button>
      <!-- limpar entrada atual (C) -->
      <button class="btn-calc clear" onclick="limparEntrada()">C</button>
      <!-- percentagem -->
      <button class="btn-calc operator" onclick="adicionarOperador('%')">%</button>
      <!-- divisão -->
      <button class="btn-calc operator" onclick="adicionarOperador('/')"><i class="bi bi-slash-lg"></i></button>

      <!-- 7 -->
      <button class="btn-calc" onclick="adicionarNumero('7')">7</button>
      <!-- 8 -->
      <button class="btn-calc" onclick="adicionarNumero('8')">8</button>
      <!-- 9 -->
      <button class="btn-calc" onclick="adicionarNumero('9')">9</button>
      <!-- multiplicação -->
      <button class="btn-calc operator" onclick="adicionarOperador('*')"><i class="bi bi-asterisk"></i></button>

      <!-- 4 -->
      <button class="btn-calc" onclick="adicionarNumero('4')">4</button>
      <!-- 5 -->
      <button class="btn-calc" onclick="adicionarNumero('5')">5</button>
      <!-- 6 -->
      <button class="btn-calc" onclick="adicionarNumero('6')">6</button>
      <!-- subtração -->
      <button class="btn-calc operator" onclick="adicionarOperador('-')"><i class="bi bi-dash-lg"></i></button>

      <!-- 1 -->
      <button class="btn-calc" onclick="adicionarNumero('1')">1</button>
      <!-- 2 -->
      <button class="btn-calc" onclick="adicionarNumero('2')">2</button>
      <!-- 3 -->
      <button class="btn-calc" onclick="adicionarNumero('3')">3</button>
      <!-- adição -->
      <button class="btn-calc operator" onclick="adicionarOperador('+')"><i class="bi bi-plus-lg"></i></button>

      <!-- 0 ocupa 2 colunas? não, vamos deixar 0, ponto e igual melhor -->
      <button class="btn-calc" onclick="adicionarNumero('0')">0</button>
      <!-- ponto decimal -->
      <button class="btn-calc operator" onclick="adicionarPonto()">.</button>
      <!-- igual (azul) ocupa 2 colunas para destacar -->
      <button class="btn-calc equals" onclick="calcularResultado()"><i class="bi bi-arrow-right-short"></i> =</button>
    </div>

    <!-- link de volta para o portfólio (simulação) -->
    <div class="back-link">
      <a href="index.html"><i class="bi bi-arrow-left-short"></i> voltar ao portfólio</a>
    </div>
  </div>

  <script>
    // elementos
    const resultadoInput = document.getElementById('resultado');
    let expressao = '0';      // armazena a expressão atual
    let ultimoResultado = null; // para operações encadeadas

    // actualiza o display
    function atualizarDisplay() {
      resultadoInput.value = expressao || '0';
    }

    // adicionar número / dígito
    function adicionarNumero(num) {
      // se expressao for '0' e não for ponto, substitui
      if (expressao === '0' && num !== '.') {
        expressao = num;
      } else {
        // impede múltiplos zeros à esquerda (opcional)
        expressao += num;
      }
      atualizarDisplay();
    }

    // operadores (+, -, *, /, %)
    function adicionarOperador(op) {
      // se o último carácter já for operador, substitui (evita dois seguidos)
      const ultimo = expressao.slice(-1);
      if (['+', '-', '*', '/', '%'].includes(ultimo)) {
        expressao = expressao.slice(0, -1) + op;
      } else {
        expressao += op;
      }
      atualizarDisplay();
    }

    // ponto decimal
    function adicionarPonto() {
      // divide a expressão em partes pelo último operador para verificar números decimais
      const partes = expressao.split(/[\+\-\*\/%]/);
      const ultimoNumero = partes[partes.length - 1];
      // se o último número já tiver ponto, ignora
      if (ultimoNumero.includes('.')) return;
      // se expressao termina com operador, adiciona '0.'
      if (['+', '-', '*', '/', '%'].includes(expressao.slice(-1))) {
        expressao += '0.';
      } else if (expressao === '') {
        expressao = '0.';
      } else {
        expressao += '.';
      }
      atualizarDisplay();
    }

    // limpar tudo (CE)
    function limparTudo() {
      expressao = '0';
      ultimoResultado = null;
      atualizarDisplay();
    }

    // limpar entrada actual (C) — apaga último carácter ou reinicia
    function limparEntrada() {
      if (expressao.length > 1) {
        expressao = expressao.slice(0, -1);
      } else {
        expressao = '0';
      }
      atualizarDisplay();
    }

    // avaliar expressão com segurança
    function calcularResultado() {
      if (!expressao) {
        expressao = '0';
        atualizarDisplay();
        return;
      }

      // substituir % por /100 (para cálculo percentual simples)
      let exprParaEval = expressao.replace(/%/g, '/100');
      
      // avaliar com try/catch para evitar erros
      try {
        // função eval segura (apenas para cálculo matemático)
        const resultado = eval(exprParaEval);
        
        // tratar resultados com muitas casas decimais
        let resultadoFormatado;
        if (Number.isInteger(resultado)) {
          resultadoFormatado = resultado.toString();
        } else {
          resultadoFormatado = resultado.toFixed(8).replace(/\.?0+$/, ''); // remove zeros desnecessários
        }
        
        expressao = resultadoFormatado;
        ultimoResultado = resultado;
      } catch (e) {
        expressao = 'Erro';
      }
      atualizarDisplay();
    }

    // permitir teclado (extra)
    document.addEventListener('keydown', function(event) {
      const key = event.key;
      if (!isNaN(key) && key !== ' ') {
        adicionarNumero(key);
      } else if (key === '.') {
        adicionarPonto();
      } else if (key === '+' || key === '-' || key === '*' || key === '/') {
        adicionarOperador(key);
      } else if (key === '%') {
        adicionarOperador('%');
      } else if (key === 'Enter' || key === '=') {
        event.preventDefault();
        calcularResultado();
      } else if (key === 'Backspace') {
        limparEntrada();
      } else if (key === 'Escape') {
        limparTudo();
      }
    });

    // inicialização
    atualizarDisplay();
  </script>
</body>
</html>
